<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bakery & Donat Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#fffaf5;
    background-image: radial-gradient(#ff7b5421 1px, transparent 1px);
    background-size:20px 20px;
    color:#333;
}

/* NAV */
nav{
    position:sticky;
    top:0;
    z-index:1000;
    background:rgba(255,123,84,0.95);
    padding:15px;
    text-align:center;
    color:white;
}

/* HERO */
<section class="hero">

    <div class="hero-content">
        <h1>Fresh Bakery & Donut</h1>
        <p>Roti & Donat fresh setiap hari • Homemade • Halal • Enak</p>

        <a href="#menu" class="hero-btn">Lihat Menu</a>
    </div>

</section>

/* CONTAINER */
.container{
    padding:40px 5%;
    max-width:1200px;
    margin:auto;
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#ff7b54;
}

/* GALLERY FIX SWIPE */
.gallery-wrapper{
    display:flex;
    overflow-x:auto;
    gap:15px;
    scroll-snap-type:x mandatory;
    -webkit-overflow-scrolling:touch;
}

.gallery-wrapper::-webkit-scrollbar{
    display:none;
}

.gallery-wrapper img{
    flex:0 0 auto;
    width:280px;
    height:180px;
    object-fit:cover;
    border-radius:15px;
    scroll-snap-align:center;
}

/* PRODUCT */
.products-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-info{
    padding:15px;
    text-align:center;
}

.btn{
    background:linear-gradient(135deg,#ff7b54,#ffb26b);
    color:white;
    border:none;
    padding:10px;
    width:100%;
    border-radius:10px;
    cursor:pointer;
}

/* CART */
.cart-section{
    margin-top:30px;
    background:white;
    padding:20px;
    border-radius:15px;
}

#cartList li{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px;
    border-bottom:1px solid #eee;
}

input,textarea{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:10px;
    border:1px solid #ddd;
}

/* FLOAT BUTTON */
.float{
    position:fixed;
    right:15px;
    bottom:15px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.float a{
    text-decoration:none;
    color:white;
    padding:10px 15px;
    border-radius:50px;
    font-weight:bold;
}

.wa{background:#25D366;}
.fb{background:#1877F2;}
.cartbtn{background:#ff7b54;}
</style>
</head>

<body>

<nav>
    <h3>Bakery Shop</h3>
</nav>

<section class="hero">
    <h1>Fresh Bakery & Donut</h1>
</section>

<!-- GALLERY -->
<div class="container">
    <h2>Gallery</h2>
    <div class="gallery-wrapper">
        <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff">
        <img src="https://images.unsplash.com/photo-1519869325930-281384150729">
        <img src="https://images.unsplash.com/photo-1542826438-bd32f43d626f">
    </div>
</div>

<!-- PRODUCT -->
<div class="container">
    <h2>Menu</h2>

    <div class="products-grid">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1608198093002-ad4e005484ec">
            <div class="card-info">
                <h3>Donat Coklat</h3>
                <p>Rp 10.000</p>
                <button class="btn" onclick="addCart('Donat Coklat',10000)">Tambah</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b">
            <div class="card-info">
                <h3>Roti Manis</h3>
                <p>Rp 8.000</p>
                <button class="btn" onclick="addCart('Roti Manis',8000)">Tambah</button>
            </div>
        </div>

    </div>
</div>

<!-- CART -->
<div class="container" id="cart">
    <h2>Keranjang</h2>

    <input id="nama" placeholder="Nama">
    <textarea id="alamat" placeholder="Alamat"></textarea>

    <div class="cart-section">
        <ul id="cartList"></ul>
        <h3 id="total">Total: Rp 0</h3>

        <button class="btn" onclick="checkout()">Checkout WhatsApp</button>
    </div>
</div>

<!-- FLOAT BUTTON -->
<div class="float">

    <a class="wa" href="https://wa.me/6281234567890" target="_blank">WhatsApp</a>

    <a class="fb" href="https://facebook.com" target="_blank">Facebook</a>

    <a class="cartbtn" href="#cart">Cart 🛒</a>

</div>

<!-- SCRIPT FULL -->
<script>
let cart=[];

function addCart(nama,harga){
    let item=cart.find(i=>i.nama===nama);
    item?item.jumlah++:cart.push({nama,harga,jumlah:1});
    render();
}

function render(){
    let list=document.getElementById("cartList");
    list.innerHTML="";
    let total=0;

    cart.forEach((i,index)=>{
        let sub=i.harga*i.jumlah;
        total+=sub;

        list.innerHTML+=`
        <li>
            ${i.nama} x${i.jumlah}
            <div>
                <button onclick="minus(${index})">-</button>
                <button onclick="plus(${index})">+</button>
                <button onclick="del(${index})">❌</button>
            </div>
        </li>`;
    });

    document.getElementById("total").innerText="Total: Rp "+total.toLocaleString();
}

function plus(i){cart[i].jumlah++;render();}
function minus(i){cart[i].jumlah--;if(cart[i].jumlah<=0)cart.splice(i,1);render();}
function del(i){cart.splice(i,1);render();}

function checkout(){
    if(cart.length===0)return alert("Kosong!");

    let nama=document.getElementById("nama").value;
    let alamat=document.getElementById("alamat").value;

    if(!nama||!alamat)return alert("Isi data!");

    let nomor="6282110677862";

    let text="🛒 INVOICE BAKERY\n\n";
    text+="Nama: "+nama+"\nAlamat: "+alamat+"\n\n";

    let total=0;

    cart.forEach(i=>{
        let sub=i.harga*i.jumlah;
        total+=sub;
        text+=`• ${i.nama} x${i.jumlah} = Rp ${sub.toLocaleString()}\n`;
    });

    text+="\nTOTAL: Rp "+total.toLocaleString();

    window.open("https://wa.me/"+nomor+"?text="+encodeURIComponent(text));
}
</script>

</body>
</html>
