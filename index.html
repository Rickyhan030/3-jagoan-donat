<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bakery Shop Level 2</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #fffaf5;
    overflow-x: hidden;
}

/* NAV */
nav {
    background: #ff7b54;
    padding: 15px;
    color: white;
    position: sticky;
    top: 0;
    z-index: 999;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* BADGE CART */
#cartBadge {
    background: red;
    color: white;
    width: 18px;
    height: 18px;
    font-size: 12px;
    border-radius: 50%;
    display: none;
    align-items: center;
    justify-content: center;
    position: absolute;
    top: -8px;
    right: -10px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 50px 20px;
    background: linear-gradient(45deg,#ff7b54,#ffb26b);
    color: white;
}

.hero h1 {
    font-size: 2rem;
}

/* SLIDER */
.gallery-wrapper {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding: 15px;
    scroll-snap-type: x mandatory;
}

.gallery-wrapper img {
    width: 250px;
    height: 180px;
    object-fit: cover;
    border-radius: 15px;
    flex: 0 0 auto;
    scroll-snap-align: center;
}

/* PRODUCT */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(150px,1fr));
    gap: 15px;
    padding: 20px;
}

.card {
    background: white;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.card img {
    width: 100%;
    height: 120px;
    object-fit: cover;
}

.card button {
    width: 100%;
    padding: 10px;
    border: none;
    background: #ff7b54;
    color: white;
}

/* CART */
.cart {
    padding: 20px;
    background: white;
    margin: 20px;
    border-radius: 15px;
}

#cartList li {
    display: flex;
    justify-content: space-between;
    margin-bottom: 10px;
}

/* FLOAT BUTTON */
.float {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.float a {
    padding: 10px 15px;
    border-radius: 50px;
    color: white;
    text-decoration: none;
    font-weight: bold;
}

.wa { background: #25D366; }
.fb { background: #1877F2; }
.cartbtn { background: #ff7b54; }

/* TOAST */
#toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: #333;
    color: white;
    padding: 10px 20px;
    border-radius: 20px;
    opacity: 0;
    transition: 0.3s;
}
#toast.show { opacity: 1; }
</style>
</head>

<body>

<nav>
    <div>Bakery Shop</div>
    <div style="position:relative;">
        🛒
        <div id="cartBadge">0</div>
    </div>
</nav>

<div class="hero">
    <h1>Fresh Bakery & Donut</h1>
</div>

<!-- SLIDER -->
<div class="gallery-wrapper">
    <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff">
    <img src="https://images.unsplash.com/photo-1519869325930-281384150729">
    <img src="https://images.unsplash.com/photo-1542826438-bd32f43d626f">
</div>

<!-- PRODUCT -->
<div class="products">
    <div class="card">
        <img src="https://images.unsplash.com/photo-1608198093002-ad4e005484ec">
        <button onclick="addCart('Donat Coklat',10000)">Tambah</button>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b">
        <button onclick="addCart('Roti Manis',8000)">Tambah</button>
    </div>
</div>

<!-- CART -->
<div class="cart">
    <h3>Keranjang</h3>
    <ul id="cartList"></ul>
    <div id="total"></div>
    <button onclick="checkout()" style="margin-top:10px;padding:10px;width:100%;background:#ff7b54;color:white;border:none;">
        Checkout WhatsApp
    </button>
</div>

<!-- FLOAT -->
<div class="float">
    <a class="wa" href="https://wa.me/6281234567890">WhatsApp</a>
    <a class="fb" href="https://facebook.com">Facebook</a>
    <a class="cartbtn" href="#cartList">Cart</a>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
let cart = [];

const ONGKIR = 10000;
const DISKON = 0.1;

function addCart(nama, harga) {
    let item = cart.find(i => i.nama === nama);
    item ? item.jumlah++ : cart.push({nama, harga, jumlah:1});
    toast(nama + " ditambahkan");
    render();
}

function render() {
    let list = document.getElementById("cartList");
    list.innerHTML = "";

    let sub = 0;

    cart.forEach((i, idx) => {
        let total = i.harga * i.jumlah;
        sub += total;

        list.innerHTML += `
        <li>
            ${i.nama} x${i.jumlah}
            <div>
                <button onclick="minus(${idx})">-</button>
                <button onclick="plus(${idx})">+</button>
                <button onclick="hapus(${idx})">❌</button>
            </div>
        </li>`;
    });

    let diskon = sub * DISKON;
    let total = sub - diskon + ONGKIR;

    document.getElementById("total").innerHTML =
    "Subtotal: " + sub.toLocaleString() +
    "<br>Diskon: " + diskon.toLocaleString() +
    "<br>Ongkir: " + ONGKIR +
    "<br><b>Total: " + total.toLocaleString() + "</b>";

    document.getElementById("cartBadge").style.display = cart.length ? "flex" : "none";
    document.getElementById("cartBadge").innerText = cart.reduce((a,b)=>a+b.jumlah,0);
}

function plus(i){ cart[i].jumlah++; render(); }
function minus(i){ cart[i].jumlah--; if(cart[i].jumlah<=0) cart.splice(i,1); render(); }
function hapus(i){ cart.splice(i,1); render(); }

function checkout(){
    let text = "ORDER BAKERY:\n";
    cart.forEach(i=>{
        text += i.nama+" x"+i.jumlah+"\n";
    });

    window.open("https://wa.me/6281234567890?text="+encodeURIComponent(text));
}

function toast(msg){
    let t = document.getElementById("toast");
    t.innerText = msg;
    t.classList.add("show");
    setTimeout(()=>t.classList.remove("show"),2000);
}

render();
</script>

</body>
</html>
