<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bakery Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background-color: #fffaf5;
    background-image: radial-gradient(#ff7b5421 1px, transparent 1px);
    background-size: 20px 20px;
    color: #333;
    line-height: 1.6;
    overflow-x: hidden;
}

/* NAV */
nav {
    display: flex;
    justify-content: center;
    padding: 20px;
    background: rgba(255, 123, 84, 0.95);
    backdrop-filter: blur(10px);
    color: white;
    position: sticky;
    top: 0;
    z-index: 1000;
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px;
    position: relative;
}

.hero h1 {
    font-size: clamp(2.5rem, 8vw, 4rem);
    font-weight: 900;
    color: #fff;
    text-shadow: 2px 2px 0px #e67e22,
                 4px 4px 0px #d35400,
                 6px 6px 15px rgba(0,0,0,0.3);
    font-style: italic;
}

/* CONTAINER */
.container {
    padding: 50px 5%;
    max-width: 1200px;
    margin: auto;
}

/* TITLE */
h2 {
    text-align: center;
    margin-bottom: 30px;
    color: #ff7b54;
}

/* ===================== */
/* SLIDER STYLE (FIXED) */
/* ===================== */
.gallery-wrapper {
    display: flex;
    overflow-x: auto;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;

    gap: 20px;
    padding: 20px 0;

    scroll-behavior: smooth;
}

.gallery-wrapper::-webkit-scrollbar {
    display: none;
}

.gallery-wrapper img {
    flex: 0 0 auto;
    width: 280px;
    height: 200px;
    object-fit: cover;
    border-radius: 20px;

    scroll-snap-align: center;
    transition: 0.3s;
}

.gallery-wrapper img:active {
    transform: scale(0.97);
}

/* PRODUCT GRID */
.products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 30px;
}

/* CARD */
.card {
    background: rgba(255, 255, 255, 0.85);
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px) scale(1.02);
}

.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

.card-info {
    padding: 20px;
    text-align: center;
}

.card-info p {
    color: #ff7b54;
    font-weight: bold;
}

/* BUTTON */
.btn-add {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #ff7b54, #ffb26b);
    border: none;
    color: white;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
}

.btn-add:hover {
    transform: scale(1.05);
}

/* FOOTER */
footer {
    background: #2d2d2d;
    color: white;
    text-align: center;
    padding: 40px;
    margin-top: 60px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
    <h3>Bakery Shop</h3>
</nav>

<!-- HERO -->
<section class="hero">
    <h1>Fresh Bakery & Donut</h1>
</section>

<!-- GALERI SLIDER -->
<div class="container">
    <h2>Gallery Produk</h2>

    <div class="gallery-wrapper" id="slider">
        <img src="https://images.unsplash.com/photo-1509440159596-0249088772ff">
        <img src="https://images.unsplash.com/photo-1519869325930-281384150729">
        <img src="https://images.unsplash.com/photo-1542826438-bd32f43d626f">
        <img src="https://images.unsplash.com/photo-1555507036-ab1f4038808a">
    </div>
</div>

<!-- PRODUCTS -->
<div class="container">
    <h2>Menu</h2>

    <div class="products-grid">
        <div class="card">
            <img src="https://images.unsplash.com/photo-1608198093002-ad4e005484ec">
            <div class="card-info">
                <h3>Donut Coklat</h3>
                <p>Rp 10.000</p>
                <button class="btn-add">Tambah</button>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b">
            <div class="card-info">
                <h3>Roti Manis</h3>
                <p>Rp 8.000</p>
                <button class="btn-add">Tambah</button>
            </div>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer>
    <p>© 2026 Bakery Shop - All Rights Reserved</p>
</footer>

<!-- AUTO SLIDER JS -->
<script>
const slider = document.getElementById("slider");

let scrollAmount = 0;
const slideWidth = 300;

function autoSlide() {
    if (!slider) return;

    scrollAmount += slideWidth;

    if (scrollAmount >= slider.scrollWidth - slider.clientWidth) {
        scrollAmount = 0;
    }

    slider.scrollTo({
        left: scrollAmount,
        behavior: "smooth"
    });
}

// auto jalan tiap 3 detik
let interval = setInterval(autoSlide, 3000);

// pause saat user sentuh
slider.addEventListener("touchstart", () => clearInterval(interval));
slider.addEventListener("mousedown", () => clearInterval(interval));

// restart
slider.addEventListener("touchend", () => {
    interval = setInterval(autoSlide, 3000);
});

slider.addEventListener("mouseup", () => {
    interval = setInterval(autoSlide, 3000);
});
</script>

</body>
</html>
